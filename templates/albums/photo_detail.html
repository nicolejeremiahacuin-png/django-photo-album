{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="mb-4 text-start" style="max-width: 650px; margin: 0 auto;">
        <a href="{% url 'album-detail' photo.album.id %}" class="btn btn-outline-secondary btn-sm px-3 shadow-sm" style="border-radius: 8px;">
            ← Save & Exit
        </a>
    </div>

    <div class="card shadow border-0 bg-white mx-auto" style="max-width: 650px; border-radius: 16px; overflow: hidden;">
        
        <div class="p-3 border-bottom d-flex justify-content-between align-items-center" style="background-color: #f8fafc;">
            <h5 class="fw-bold mb-0" style="color: #1e293b;">{{ photo.title }}</h5>
            <small class="text-muted">{{ photo.uploaded_at|date:"M d, Y" }}</small>
        </div>
        
        <div class="p-3 text-center" style="background-color: #f1f5f9;">
            <img src="{{ photo.image.url }}" 
                 alt="{{ photo.title }}" 
                 class="img-fluid rounded shadow-sm" 
                 style="max-height: 400px; max-width: 100%; object-fit: contain; display: inline-block;">
        </div>

        <div class="card-footer p-3 bg-white d-flex justify-content-between align-items-center border-0">
            <small class="text-secondary">Vault: <span class="badge bg-light text-dark border">{{ photo.album.title }}</span></small>
            
            {% if user == photo.album.owner or user.is_staff %}
                <a href="{% url 'photo-delete' photo.id %}" class="btn btn-danger btn-sm px-3" style="border-radius: 8px;">
                    Delete Photo
                </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
