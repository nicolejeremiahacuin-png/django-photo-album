{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center">
    <div class="card border-0 shadow-sm text-center p-4" style="max-width: 450px; border-radius: 16px;">
        <div class="card-body">
            <div class="fs-1 mb-3 text-danger">⚠️</div>
            <h4 class="fw-bold text-slate-800 mb-2">Delete Photo Permanently?</h4>
            <p class="text-muted small mb-4">Are you sure you want to delete <strong>"{{ object.title }}"</strong>? This action will permanently remove it from your Cloudinary cloud vault storage.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger py-2 fw-medium">Yes, Delete Photo</button>
                    <a href="{% url 'photo-detail' object.id %}" class="btn btn-light py-2 text-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
