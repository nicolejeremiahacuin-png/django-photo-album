{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-2">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header text-white p-4" style="background-color: #1e3a8a; border-radius: 12px 12px 0 0;">
                <h4 class="mb-0 fw-bold">✨ Configure Album Vault</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-4">
                            <label for="{{ field.id_for_label }}" class="form-label small fw-bold" style="color: #475569;">{{ field.label }}</label>
                            
                            {% if field.field.widget.input_type == "checkbox" %}
                                <div class="form-check form-switch mt-1">
                                    <input class="form-check-input" type="checkbox" name="{{ field.name }}" id="{{ field.id_for_label }}" {% if field.value %}checked{% endif %}>
                                    <label class="form-check-label text-muted small" for="{{ field.id_for_label }}">Restrict access to your authenticated profile only</label>
                                </div>
                            {% else %}
                                <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}" id="{{ field.id_for_label }}" class="form-control p-2.5" style="border-radius: 8px; border: 1px solid #cbd5e1;" value="{{ field.value|default_if_none:'' }}">
                            {% endif %}
                            
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'album-list' %}" class="btn btn-light px-4 border text-muted">Cancel</a>
                        <button type="submit" class="btn btn-aesthetic-primary px-4">Confirm & Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
