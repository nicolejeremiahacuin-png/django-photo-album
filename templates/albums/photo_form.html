{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header text-white p-4" style="background-color: #1e3a8a; border-radius: 12px 12px 0 0;">
                <h4 class="mb-0 fw-bold">📤 Upload New Photo Asset</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data" novalidate>
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-4">
                            <label for="{{ field.id_for_label }}" class="form-label small fw-bold" style="color: #475569;">{{ field.label }}</label>
                            
                            {% if field.field.widget.input_type == "file" %}
                                <input type="file" name="{{ field.name }}" id="{{ field.id_for_label }}" class="form-control p-2.5" style="border-radius: 8px; border: 1px solid #cbd5e1;" accept="image/*" required>
                            {% else %}
                                <input type="text" name="{{ field.name }}" id="{{ field.id_for_label }}" class="form-control p-2.5" style="border-radius: 8px; border: 1px solid #cbd5e1;" value="{{ field.value|default_if_none:'' }}" required>
                            {% endif %}
                            
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'album-detail' view.kwargs.album_id %}" class="btn btn-light px-4 border text-muted">Cancel</a>
                        <button type="submit" class="btn btn-aesthetic-primary px-4">Upload to Cloud Vault</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
