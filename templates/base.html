<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom Aesthetic Color Palette Variables */
        :root {
            --primary-blue: #1e3a8a;       /* Deep Majestic Blue */
            --accent-blue: #3b82f6;        /* Vibrant Ocean Blue */
            --bg-aesthetic: #f4f6f9;       /* Muted Slate Gray-White Canvas */
            --text-dark: #334155;          /* Charcoal Slate Text */
        }
        
        body {
            background-color: var(--bg-aesthetic);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .custom-navbar {
            background-color: var(--primary-blue) !important;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.15);
        }

        .btn-aesthetic-primary {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .btn-aesthetic-primary:hover {
            background-color: #2563eb;
            color: white;
            transform: translateY(-1px);
        }

        .card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold tracking-wide" href="{% url 'album-list' %}">📸 Photo Vault</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-3 text-white-50">Welcome, <strong>{{ user.username }}</strong></span>
                    <a class="btn btn-aesthetic-primary btn-sm me-2 px-3" href="{% url 'album-create' %}">+ New Album</a>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm opacity-75">Logout</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm px-3" href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
